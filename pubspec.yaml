name: loyalty_app
description: Loyalty rewards for hospitality venues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP & Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # Secure Storage (JWT)
  flutter_secure_storage: ^9.0.0

  # QR Code Scanner
  mobile_scanner: ^5.2.2

  # Location (for point sharing proximity)
  geolocator: ^12.0.0

  # Local Storage
  shared_preferences: ^2.2.3

  # JSON Serialization
  json_annotation: ^4.9.0

  # Image Loading
  cached_network_image: ^3.3.1

  # UI Utilities
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Icons
  phosphor_flutter: ^2.1.0

  # Fonts
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2

  flutter_lints: ^3.0.0

  # App Icon
  flutter_launcher_icons: ^0.13.1

  # Splash Screen
  flutter_native_splash: ^2.3.9

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#0F0F0F"
  image: assets/icon/app_icon.png
  android_12:
    color: "#0F0F0F"
    image: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
